<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
width:100vw;
height:100vh;
display:block;
}

.label{
position:absolute;
left:50%;
transform:translateX(-50%);
font-size:14px;
}

#extra{top:20px}
#outer{top:32vh}
#core{top:50vh}
#inner{top:68vh}
#cyto{bottom:120px}

.legend{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:12px 16px;
border-radius:10px;
font-size:13px;
display:grid;
grid-template-columns:1fr 1fr;
gap:6px 20px;
}

.sym{
display:inline-block;
width:14px;
height:14px;
margin-right:6px;
}

.head{background:#d86adf}
.tail{background:#ff9ed1}
.chol{background:#ffd000}
.raft{background:#ffaa00}
.glyco{background:#40c057}
.cyt{background:#ff6b6b}

</style>
</head>

<body>

<canvas id="membrane"></canvas>

<div id="extra" class="label">Extracellular space</div>
<div id="outer" class="label">Hydrophilic surface</div>
<div id="core" class="label">Hydrophobic lipid core</div>
<div id="inner" class="label">Hydrophilic surface</div>
<div id="cyto" class="label">Cytoplasm</div>

<div class="legend">
<div><span class="sym head"></span>Phospholipid head</div>
<div><span class="sym tail"></span>Fatty acid tails</div>
<div><span class="sym chol"></span>Cholesterol</div>
<div><span class="sym raft"></span>Lipid raft</div>
<div><span class="sym glyco"></span>Glycoprotein</div>
<div><span class="sym cyt"></span>Cytoskeleton</div>
</div>

<script>

const canvas=document.getElementById("membrane")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.addEventListener("resize",resize)

const mid=()=>canvas.height/2

/* PHOSPHOLIPID */

class Lipid{

constructor(x,leaflet){

this.x=x
this.leaflet=leaflet
this.v=(Math.random()-0.5)*0.15
this.phase=Math.random()*Math.PI
this.unsaturated=Math.random()<0.4
this.flip=false
this.flipProgress=0

}

move(){

this.x+=this.v
this.phase+=0.08

if(this.x<0) this.x=canvas.width
if(this.x>canvas.width) this.x=0

if(!this.flip && Math.random()<0.000002){
this.flip=true
this.flipProgress=0
}

if(this.flip){
this.flipProgress+=0.02
if(this.flipProgress>=1){
this.flip=false
this.leaflet=this.leaflet==="outer"?"inner":"outer"
}
}

}

draw(){

let y=this.leaflet==="outer"?mid()-90:mid()+90
const dir=this.leaflet==="outer"?1:-1

if(this.flip){

const start=this.leaflet==="outer"?mid()-90:mid()+90
const end=this.leaflet==="outer"?mid()+90:mid()-90
y=start+(end-start)*this.flipProgress

}

ctx.fillStyle="#d86adf"
ctx.beginPath()
ctx.arc(this.x,y,10,0,Math.PI*2)
ctx.fill()

const bend=Math.sin(this.phase)*6

ctx.strokeStyle="#ff9ed1"
ctx.lineWidth=2

ctx.beginPath()

if(this.unsaturated){

ctx.moveTo(this.x-4,y)
ctx.quadraticCurveTo(this.x-10,y+dir*20,this.x-6+bend,y+dir*60)

}else{

ctx.moveTo(this.x-4,y)
ctx.lineTo(this.x-4+bend,y+dir*60)

}

ctx.moveTo(this.x+4,y)
ctx.lineTo(this.x+4-bend,y+dir*60)

ctx.stroke()

}

}

/* CHOLESTEROL */

class Cholesterol{

constructor(x){
this.x=x
this.v=(Math.random()-0.5)*0.06
}

move(){
this.x+=this.v
if(this.x<0) this.x=canvas.width
if(this.x>canvas.width) this.x=0
}

draw(){

ctx.fillStyle="#ffd000"

ctx.fillRect(this.x-4,mid()-35,8,70)

ctx.beginPath()
ctx.arc(this.x,mid()-40,3,0,Math.PI*2)
ctx.fill()

}

}

/* LIPID RAFT */

class Raft{

constructor(x){
this.x=x
}

draw(){

ctx.fillStyle="rgba(255,170,0,0.2)"
ctx.fillRect(this.x-40,mid()-90,80,180)

}

}

/* GLYCOPROTEIN */

class Glycoprotein{

constructor(x){
this.x=x
}

draw(){

ctx.fillStyle="#40c057"

ctx.beginPath()
ctx.arc(this.x,mid()-120,6,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="#40c057"

ctx.beginPath()
ctx.moveTo(this.x,mid()-120)
ctx.lineTo(this.x,mid()-160)

ctx.moveTo(this.x,mid()-150)
ctx.lineTo(this.x-10,mid()-170)

ctx.moveTo(this.x,mid()-150)
ctx.lineTo(this.x+10,mid()-170)

ctx.stroke()

}

}

/* CYTOSKELETON */

class Cytoskeleton{

constructor(x){
this.x=x
}

draw(){

ctx.strokeStyle="#ff6b6b"

ctx.beginPath()
ctx.moveTo(this.x,mid()+110)
ctx.lineTo(this.x+30,mid()+140)
ctx.stroke()

}

}

/* ARRAYS */

const lipids=[]
const cholesterol=[]
const rafts=[]
const glyco=[]
const cytoskeleton=[]

for(let x=0;x<canvas.width;x+=22){
lipids.push(new Lipid(x,"outer"))
lipids.push(new Lipid(x,"inner"))
}

for(let x=40;x<canvas.width;x+=120){
cholesterol.push(new Cholesterol(x))
}

for(let i=0;i<4;i++)
rafts.push(new Raft(Math.random()*canvas.width))

for(let i=0;i<8;i++)
glyco.push(new Glycoprotein(Math.random()*canvas.width))

for(let i=0;i<10;i++)
cytoskeleton.push(new Cytoskeleton(Math.random()*canvas.width))

/* ANIMATION */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="rgba(255,255,255,0.04)"
ctx.fillRect(0,mid()-90,canvas.width,180)

rafts.forEach(r=>r.draw())

lipids.forEach(l=>{l.move();l.draw()})

cholesterol.forEach(c=>{c.move();c.draw()})

glyco.forEach(g=>g.draw())

cytoskeleton.forEach(c=>c.draw())

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
