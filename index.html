<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
}

canvas{
width:100vw;
height:100vh;
display:block;
}

.label{
position:absolute;
left:50%;
transform:translateX(-50%);
font-size:14px;
}

#extra{top:20px}
#outer{top:32vh}
#core{top:50vh}
#inner{top:68vh}
#cyto{bottom:120px}

</style>
</head>

<body>

<canvas id="membrane"></canvas>

<div id="extra" class="label">Extracellular space</div>
<div id="outer" class="label">Outer hydrophilic surface</div>
<div id="core" class="label">Hydrophobic lipid core</div>
<div id="inner" class="label">Inner hydrophilic surface</div>
<div id="cyto" class="label">Cytoplasm</div>

<script>

const canvas=document.getElementById("membrane")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.addEventListener("resize",resize)

const mid=()=>canvas.height/2

/* geometry */

const HEAD_RADIUS=9
const TAIL_LENGTH=75
const BILAYER_OFFSET=95
const SPACING=16

/* ======================
PHOSPHOLIPID
====================== */

class Lipid{

constructor(x,leaflet){

this.x=x
this.leaflet=leaflet
this.v=(Math.random()-0.5)*0.14
this.phase=Math.random()*Math.PI

this.unsaturated=Math.random()<0.4

this.flip=false
this.flipProgress=0

}

move(){

this.x+=this.v
this.phase+=0.07

if(this.x<0) this.x=canvas.width
if(this.x>canvas.width) this.x=0

/* rare flip-flop */

if(!this.flip && Math.random()<0.000001){
this.flip=true
this.flipProgress=0
}

if(this.flip){

this.flipProgress+=0.02

if(this.flipProgress>=1){
this.flip=false
this.leaflet=this.leaflet==="outer"?"inner":"outer"
}

}

}

draw(){

let y=this.leaflet==="outer"?mid()-BILAYER_OFFSET:mid()+BILAYER_OFFSET
const dir=this.leaflet==="outer"?1:-1

if(this.flip){

const start=this.leaflet==="outer"?mid()-BILAYER_OFFSET:mid()+BILAYER_OFFSET
const end=this.leaflet==="outer"?mid()+BILAYER_OFFSET:mid()-BILAYER_OFFSET
y=start+(end-start)*this.flipProgress

}

/* head */

ctx.fillStyle="#4dabf7"

ctx.beginPath()
ctx.arc(this.x,y,HEAD_RADIUS,0,Math.PI*2)
ctx.fill()

/* tails */

ctx.strokeStyle="#ffd43b"
ctx.lineWidth=2

const bend=Math.sin(this.phase)*6

ctx.beginPath()

if(this.unsaturated){

ctx.moveTo(this.x-4,y)
ctx.quadraticCurveTo(this.x-10,y+dir*25,this.x-6+bend,y+dir*TAIL_LENGTH)

}else{

ctx.moveTo(this.x-4,y)
ctx.lineTo(this.x-4+bend,y+dir*TAIL_LENGTH)

}

ctx.moveTo(this.x+4,y)
ctx.lineTo(this.x+4-bend,y+dir*TAIL_LENGTH)

ctx.stroke()

}

}

/* ======================
CHOLESTEROL
====================== */

class Cholesterol{

constructor(x){

this.x=x
this.v=(Math.random()-0.5)*0.06

}

move(){

this.x+=this.v

if(this.x<0) this.x=canvas.width
if(this.x>canvas.width) this.x=0

}

draw(){

ctx.fillStyle="#ffe066"

/* sterol body */

ctx.fillRect(this.x-4,mid()-38,8,76)

/* hydroxyl head */

ctx.beginPath()
ctx.arc(this.x,mid()-42,3,0,Math.PI*2)
ctx.fill()

}

}

/* ======================
ION CHANNEL
====================== */

class Channel{

constructor(x){
this.x=x
this.ions=[]
}

move(){

if(Math.random()<0.03)
this.ions.push({y:mid()-120})

this.ions.forEach(i=>i.y+=2)

this.ions=this.ions.filter(i=>i.y<mid()+120)

}

draw(){

ctx.fillStyle="#6c5ce7"

ctx.beginPath()
ctx.roundRect(this.x-16,mid()-115,32,230,12)
ctx.fill()

ctx.fillStyle="#00e5ff"

this.ions.forEach(i=>{
ctx.beginPath()
ctx.arc(this.x,i.y,4,0,Math.PI*2)
ctx.fill()
})

}

}

/* ======================
CARRIER
====================== */

class Carrier{

constructor(x){
this.x=x
this.phase=0
}

move(){
this.phase+=0.05
}

draw(){

const w=20+Math.sin(this.phase)*7

ctx.fillStyle="#ff922b"

ctx.beginPath()
ctx.ellipse(this.x,mid(),w,100,0,0,Math.PI*2)
ctx.fill()

}

}

/* ======================
INTEGRAL PROTEIN
====================== */

class Integral{

constructor(x){
this.x=x
}

draw(){

ctx.fillStyle="#845ef7"

ctx.beginPath()
ctx.roundRect(this.x-18,mid()-115,36,230,14)
ctx.fill()

}

}

/* ======================
GLYCOPROTEIN
====================== */

class Glycoprotein{

constructor(x){
this.x=x
}

draw(){

ctx.fillStyle="#40c057"

ctx.beginPath()
ctx.arc(this.x,mid()-130,6,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="#40c057"

ctx.beginPath()
ctx.moveTo(this.x,mid()-130)
ctx.lineTo(this.x,mid()-170)

ctx.moveTo(this.x,mid()-155)
ctx.lineTo(this.x-12,mid()-180)

ctx.moveTo(this.x,mid()-155)
ctx.lineTo(this.x+12,mid()-180)

ctx.stroke()

}

}

/* ======================
CYTOSKELETON
====================== */

class Cytoskeleton{

constructor(x){
this.x=x
}

draw(){

ctx.strokeStyle="#ff6b6b"

ctx.beginPath()
ctx.moveTo(this.x,mid()+115)
ctx.lineTo(this.x+35,mid()+150)
ctx.stroke()

}

}

/* ARRAYS */

const lipids=[]
const cholesterol=[]

for(let x=0;x<canvas.width;x+=SPACING){

lipids.push(new Lipid(x,"outer"))
lipids.push(new Lipid(x,"inner"))

}

for(let x=30;x<canvas.width;x+=110)
cholesterol.push(new Cholesterol(x))

const channels=[
new Channel(canvas.width*0.25),
new Channel(canvas.width*0.75)
]

const carrier=new Carrier(canvas.width*0.55)
const integral=new Integral(canvas.width*0.4)

const glyco=[]
const cytoskeleton=[]

for(let i=0;i<8;i++)
glyco.push(new Glycoprotein(Math.random()*canvas.width))

for(let i=0;i<12;i++)
cytoskeleton.push(new Cytoskeleton(Math.random()*canvas.width))

/* ======================
ANIMATION
====================== */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="rgba(255,255,255,0.04)"
ctx.fillRect(0,mid()-95,canvas.width,190)

lipids.forEach(l=>{l.move();l.draw()})

cholesterol.forEach(c=>{c.move();c.draw()})

channels.forEach(c=>{c.move();c.draw()})

carrier.move()
carrier.draw()

integral.draw()

glyco.forEach(g=>g.draw())

cytoskeleton.forEach(c=>c.draw())

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
