<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
}

canvas{
width:100vw;
height:100vh;
display:block;
}

/* labels */

.label{
position:absolute;
left:50%;
transform:translateX(-50%);
font-size:14px;
}

#extra{top:20px}
#outer{top:33vh}
#core{top:50vh}
#inner{top:67vh}
#cyto{bottom:120px}

/* legend */

.legend{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.65);
padding:14px 18px;
border-radius:10px;
display:grid;
grid-template-columns:1fr 1fr;
gap:6px 24px;
font-size:13px;
}

.sym{
display:inline-block;
width:14px;
height:14px;
margin-right:6px;
}

.head{background:#4dabf7}
.tail{background:#ffd43b}
.chol{background:#ffe066}
.channel{background:#6c5ce7}
.carrier{background:#ff922b}
.integral{background:#845ef7}
glyco{background:#40c057}
.cyt{background:#ff6b6b}

</style>
</head>

<body>

<canvas id="membrane"></canvas>

<div id="extra" class="label">Extracellular space</div>
<div id="outer" class="label">Outer hydrophilic surface</div>
<div id="core" class="label">Hydrophobic lipid core</div>
<div id="inner" class="label">Inner hydrophilic surface</div>
<div id="cyto" class="label">Cytoplasm</div>

<div class="legend">

<div><span class="sym head"></span>Phospholipid head</div>
<div><span class="sym tail"></span>Fatty acid tails</div>
<div><span class="sym chol"></span>Cholesterol</div>
<div><span class="sym channel"></span>Ion channel</div>
<div><span class="sym carrier"></span>Carrier protein</div>
<div><span class="sym integral"></span>Integral protein</div>
<div><span class="sym glyco"></span>Glycoprotein</div>
<div><span class="sym cyt"></span>Cytoskeleton</div>

</div>

<script>

const canvas=document.getElementById("membrane")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.addEventListener("resize",resize)

const mid=()=>canvas.height/2

/* geometry */

const HEAD=9
const TAIL=75
const OFFSET=95
const SPACING=16

/* ======================
CHOLESTEROL
====================== */

class Cholesterol{

constructor(x){
this.x=x
}

move(){

this.x+=(Math.random()-0.5)*0.2

if(this.x<-40) this.x=canvas.width+40
if(this.x>canvas.width+40) this.x=-40

}

draw(){

ctx.fillStyle="#ffe066"

ctx.fillRect(this.x-4,mid()-38,8,76)

ctx.beginPath()
ctx.arc(this.x,mid()-42,3,0,Math.PI*2)
ctx.fill()

}

}

/* ======================
PHOSPHOLIPID
====================== */

class Lipid{

constructor(x,leaflet){

this.x=x
this.leaflet=leaflet

this.vx=(Math.random()-0.5)*0.2

this.phase=Math.random()*Math.PI
this.unsat=Math.random()<0.35

this.flip=false
this.flipP=0

}

move(){

/* cholesterol ordering */

let slow=1

cholesterol.forEach(c=>{
if(Math.abs(c.x-this.x)<25){
slow=0.5
}
})

/* Brownian acceleration */

this.vx+=(Math.random()-0.5)*0.05

if(this.vx>0.4) this.vx=0.4
if(this.vx<-0.4) this.vx=-0.4

this.x+=this.vx*slow

this.phase+=0.08

/* infinite wrap */

if(this.x<-40) this.x=canvas.width+40
if(this.x>canvas.width+40) this.x=-40

/* rare flip flop */

if(!this.flip && Math.random()<0.000001){

this.flip=true
this.flipP=0

}

if(this.flip){

this.flipP+=0.02

if(this.flipP>=1){

this.flip=false
this.leaflet=this.leaflet==="outer"?"inner":"outer"

}

}

}

draw(){

let y=this.leaflet==="outer"?mid()-OFFSET:mid()+OFFSET
const dir=this.leaflet==="outer"?1:-1

if(this.flip){

const start=this.leaflet==="outer"?mid()-OFFSET:mid()+OFFSET
const end=this.leaflet==="outer"?mid()+OFFSET:mid()-OFFSET

y=start+(end-start)*this.flipP

}

/* head */

ctx.fillStyle="#4dabf7"

ctx.beginPath()
ctx.arc(this.x,y,HEAD,0,Math.PI*2)
ctx.fill()

/* tail ordering near cholesterol */

let bend=Math.sin(this.phase)*6

cholesterol.forEach(c=>{
if(Math.abs(c.x-this.x)<25){
bend*=0.3
}
})

ctx.strokeStyle="#ffd43b"
ctx.lineWidth=2

ctx.beginPath()

if(this.unsat){

ctx.moveTo(this.x-4,y)
ctx.quadraticCurveTo(this.x-10,y+dir*25,this.x-6+bend,y+dir*TAIL)

}else{

ctx.moveTo(this.x-4,y)
ctx.lineTo(this.x-4+bend,y+dir*TAIL)

}

ctx.moveTo(this.x+4,y)
ctx.lineTo(this.x+4-bend,y+dir*TAIL)

ctx.stroke()

}

}

/* ======================
CHANNEL
====================== */

class Channel{

constructor(x){
this.x=x
this.ions=[]
}

move(){

if(Math.random()<0.03)
this.ions.push({y:mid()-120})

this.ions.forEach(i=>i.y+=2)

this.ions=this.ions.filter(i=>i.y<mid()+120)

}

draw(){

ctx.fillStyle="#6c5ce7"

ctx.beginPath()
ctx.roundRect(this.x-16,mid()-115,32,230,12)
ctx.fill()

ctx.fillStyle="#00e5ff"

this.ions.forEach(i=>{
ctx.beginPath()
ctx.arc(this.x,i.y,4,0,Math.PI*2)
ctx.fill()
})

}

}

/* ======================
CARRIER
====================== */

class Carrier{

constructor(x){
this.x=x
this.phase=0
}

move(){
this.phase+=0.05
}

draw(){

const w=20+Math.sin(this.phase)*6

ctx.fillStyle="#ff922b"

ctx.beginPath()
ctx.ellipse(this.x,mid(),w,100,0,0,Math.PI*2)
ctx.fill()

}

}

/* ======================
INTEGRAL PROTEIN
====================== */

class Integral{

constructor(x){
this.x=x
}

draw(){

ctx.fillStyle="#845ef7"

ctx.beginPath()
ctx.roundRect(this.x-18,mid()-115,36,230,14)
ctx.fill()

}

}

/* GLYCOPROTEIN */

class Glycoprotein{

constructor(x){
this.x=x
}

draw(){

ctx.fillStyle="#40c057"

ctx.beginPath()
ctx.arc(this.x,mid()-130,6,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="#40c057"

ctx.beginPath()
ctx.moveTo(this.x,mid()-130)
ctx.lineTo(this.x,mid()-170)

ctx.moveTo(this.x,mid()-155)
ctx.lineTo(this.x-12,mid()-180)

ctx.moveTo(this.x,mid()-155)
ctx.lineTo(this.x+12,mid()-180)

ctx.stroke()

}

}

/* CYTOSKELETON */

class Cytoskeleton{

constructor(x){
this.x=x
}

draw(){

ctx.strokeStyle="#ff6b6b"

ctx.beginPath()
ctx.moveTo(this.x,mid()+115)
ctx.lineTo(this.x+35,mid()+150)
ctx.stroke()

}

}

/* ARRAYS */

const lipids=[]
const cholesterol=[]

for(let x=0;x<canvas.width;x+=SPACING){
lipids.push(new Lipid(x,"outer"))
lipids.push(new Lipid(x,"inner"))
}

for(let x=30;x<canvas.width;x+=110)
cholesterol.push(new Cholesterol(x))

const channels=[
new Channel(canvas.width*0.25),
new Channel(canvas.width*0.75)
]

const carrier=new Carrier(canvas.width*0.55)
const integral=new Integral(canvas.width*0.4)

const glyco=[]
const cytos=[]

for(let i=0;i<8;i++)
glyco.push(new Glycoprotein(Math.random()*canvas.width))

for(let i=0;i<12;i++)
cytos.push(new Cytoskeleton(Math.random()*canvas.width))

/* animation */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="rgba(255,255,255,0.04)"
ctx.fillRect(0,mid()-95,canvas.width,190)

lipids.forEach(l=>{l.move();l.draw()})
cholesterol.forEach(c=>{c.move();c.draw()})

channels.forEach(c=>{c.move();c.draw()})

carrier.move()
carrier.draw()

integral.draw()

glyco.forEach(g=>g.draw())
cytos.forEach(c=>c.draw())

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
