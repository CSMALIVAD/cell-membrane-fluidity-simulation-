<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
}

canvas{
width:100vw;
height:100vh;
display:block;
}

.label{
position:absolute;
left:50%;
transform:translateX(-50%);
font-size:14px;
}

#extra{top:20px}
#outer{top:33vh}
#core{top:50vh}
#inner{top:67vh}
#cyto{bottom:120px}

.legend{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:14px 18px;
border-radius:10px;
display:grid;
grid-template-columns:1fr 1fr;
gap:6px 20px;
font-size:13px;
}

.sym{
display:inline-block;
width:14px;
height:14px;
margin-right:6px;
}

.head{background:#4dabf7}
.tail{background:#ffd43b}
.raft{background:#ffa94d}
.chol{background:#ffe066}

</style>
</head>

<body>

<canvas id="membrane"></canvas>

<div id="extra" class="label">Extracellular space</div>
<div id="outer" class="label">Outer leaflet</div>
<div id="core" class="label">Hydrophobic core</div>
<div id="inner" class="label">Inner leaflet</div>
<div id="cyto" class="label">Cytoplasm</div>

<div class="legend">

<div><span class="sym head"></span>Phospholipid head</div>
<div><span class="sym tail"></span>Fatty acid tails</div>
<div><span class="sym chol"></span>Cholesterol</div>
<div><span class="sym raft"></span>Lipid raft domain</div>

</div>

<script>

const canvas=document.getElementById("membrane")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.addEventListener("resize",resize)

const mid=()=>canvas.height/2

const OFFSET=90
const TAIL=70
const HEAD=8
const SPACING=10

let time=0

function membraneCurve(x){
return Math.sin(x*0.006+time)*8
}

/* lipid raft domains */

const rafts=[
{center:300,width:220},
{center:800,width:240}
]

function raftFactor(x){

let factor=1

rafts.forEach(r=>{
if(Math.abs(x-r.center)<r.width/2){
factor=0.4
}
})

return factor

}

/* ===================
CHOLESTEROL
=================== */

class Cholesterol{

constructor(x){
this.x=x
}

move(){

this.x+=(Math.random()-0.5)*0.1

if(this.x<-40) this.x=canvas.width+40
if(this.x>canvas.width+40) this.x=-40

}

draw(){

let y=mid()+membraneCurve(this.x)

ctx.fillStyle="#ffe066"

ctx.fillRect(this.x-3,y-35,6,70)

ctx.beginPath()
ctx.arc(this.x,y-40,3,0,Math.PI*2)
ctx.fill()

}

}

/* ===================
PHOSPHOLIPID
=================== */

class Lipid{

constructor(x,leaflet){

this.x=x
this.leaflet=leaflet

this.vx=(Math.random()-0.5)*0.2
this.phase=Math.random()*Math.PI

this.unsat=Math.random()<0.4

}

move(){

let slow=raftFactor(this.x)

/* cholesterol ordering */

cholesterol.forEach(c=>{
if(Math.abs(c.x-this.x)<25){
slow*=0.5
}
})

this.vx+=(Math.random()-0.5)*0.05

if(this.vx>0.4) this.vx=0.4
if(this.vx<-0.4) this.vx=-0.4

this.x+=this.vx*slow

if(this.x<-40) this.x=canvas.width+40
if(this.x>canvas.width+40) this.x=-40

this.phase+=0.08

}

draw(){

let base=this.leaflet==="outer"?mid()-OFFSET:mid()+OFFSET
let y=base+membraneCurve(this.x)

const dir=this.leaflet==="outer"?1:-1

ctx.fillStyle="#4dabf7"

ctx.beginPath()
ctx.arc(this.x,y,HEAD,0,Math.PI*2)
ctx.fill()

/* glycocalyx */

if(this.leaflet==="outer" && Math.random()<0.05){

ctx.strokeStyle="#40c057"

ctx.beginPath()
ctx.moveTo(this.x,y-HEAD)
ctx.lineTo(this.x,y-30)

ctx.moveTo(this.x,y-25)
ctx.lineTo(this.x-6,y-35)

ctx.moveTo(this.x,y-25)
ctx.lineTo(this.x+6,y-35)

ctx.stroke()

}

/* lipid tails */

ctx.strokeStyle="#ffd43b"
ctx.lineWidth=2

let bend=Math.sin(this.phase)*6

cholesterol.forEach(c=>{
if(Math.abs(c.x-this.x)<25){
bend*=0.3
}
})

ctx.beginPath()

if(this.unsat){

ctx.moveTo(this.x-4,y)
ctx.quadraticCurveTo(this.x-10,y+dir*25,this.x-4+bend,y+dir*TAIL)

}else{

ctx.moveTo(this.x-4,y)
ctx.lineTo(this.x-4+bend,y+dir*TAIL)

}

ctx.moveTo(this.x+4,y)
ctx.lineTo(this.x+4-bend,y+dir*TAIL)

ctx.stroke()

}

}

/* ===================
Na/K PUMP
=================== */

class Pump{

constructor(x){

this.x=x
this.state=0
this.timer=0

this.na=[]
this.k=[]

}

move(){

let center=mid()+membraneCurve(this.x)

this.timer++

if(this.state===0){

if(this.na.length<3)
this.na.push({y:center+100})

if(this.timer>40){
this.state=1
this.timer=0
}

}

else if(this.state===1){

this.na.forEach(i=>i.y-=2)

if(this.na.every(i=>i.y<center-110)){
this.na=[]
this.state=2
this.timer=0
}

}

else if(this.state===2){

if(this.k.length<2)
this.k.push({y:center-110})

if(this.timer>40){
this.state=3
this.timer=0
}

}

else if(this.state===3){

this.k.forEach(i=>i.y+=2)

if(this.k.every(i=>i.y>center+100)){
this.k=[]
this.state=0
this.timer=0
}

}

}

draw(){

let y=mid()+membraneCurve(this.x)

ctx.fillStyle="#ff6b6b"

ctx.beginPath()
ctx.roundRect(this.x-18,y-110,36,220,12)
ctx.fill()

ctx.fillStyle="#00d4ff"

this.na.forEach(i=>{
ctx.beginPath()
ctx.arc(this.x-8,i.y,4,0,Math.PI*2)
ctx.fill()
})

ctx.fillStyle="#aaff00"

this.k.forEach(i=>{
ctx.beginPath()
ctx.arc(this.x+8,i.y,4,0,Math.PI*2)
ctx.fill()
})

}

}

/* arrays */

const lipids=[]
const cholesterol=[]

for(let x=0;x<canvas.width;x+=SPACING){

lipids.push(new Lipid(x,"outer"))
lipids.push(new Lipid(x,"inner"))

}

for(let x=50;x<canvas.width;x+=120)
cholesterol.push(new Cholesterol(x))

const pump=new Pump(canvas.width*0.5)

/* animation */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

time+=0.02

ctx.fillStyle="rgba(255,255,255,0.03)"
ctx.fillRect(0,mid()-90,canvas.width,180)

/* raft visual */

rafts.forEach(r=>{
ctx.fillStyle="rgba(255,169,77,0.08)"
ctx.fillRect(r.center-r.width/2,mid()-90,r.width,180)
})

lipids.forEach(l=>{
l.move()
l.draw()
})

cholesterol.forEach(c=>{
c.move()
c.draw()
})

pump.move()
pump.draw()

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
