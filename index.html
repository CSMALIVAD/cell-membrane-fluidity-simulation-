<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
}

canvas{
width:100vw;
height:100vh;
display:block;
}

/* region labels */

.label{
position:absolute;
left:50%;
transform:translateX(-50%);
font-size:14px;
}

#extra{top:20px}
#outer{top:33vh}
#core{top:50vh}
#inner{top:67vh}
#cyto{bottom:120px}

/* legend */

.legend{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.65);
padding:14px 18px;
border-radius:10px;
display:grid;
grid-template-columns:1fr 1fr;
gap:6px 24px;
font-size:13px;
}

.sym{
display:inline-block;
width:14px;
height:14px;
margin-right:6px;
}

.head{background:#4dabf7}
.tail{background:#ffd43b}
.chol{background:#ffe066}
.channel{background:#6c5ce7}
.carrier{background:#ffa94d}
.pump{background:#ff6b6b}
.integral{background:#845ef7}

</style>
</head>

<body>

<canvas id="membrane"></canvas>

<div id="extra" class="label">Extracellular space</div>
<div id="outer" class="label">Outer hydrophilic surface</div>
<div id="core" class="label">Hydrophobic lipid core</div>
<div id="inner" class="label">Inner hydrophilic surface</div>
<div id="cyto" class="label">Cytoplasm</div>

<div class="legend">

<div><span class="sym head"></span>Phospholipid head</div>
<div><span class="sym tail"></span>Fatty acid tails</div>
<div><span class="sym chol"></span>Cholesterol</div>
<div><span class="sym channel"></span>Ion channel</div>
<div><span class="sym carrier"></span>Carrier protein</div>
<div><span class="sym pump"></span>Na⁺/K⁺ pump</div>
<div><span class="sym integral"></span>Integral protein</div>

</div>

<script>

const canvas=document.getElementById("membrane")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.addEventListener("resize",resize)

const mid=()=>canvas.height/2

const OFFSET=95
const TAIL=70
const HEAD=9
const SPACING=10

/* dynamic membrane curvature */

let time=0

function membraneCurve(x){
return Math.sin(x*0.006+time)*12
}

/* ====================
PHOSPHOLIPID
==================== */

class Lipid{

constructor(x,leaflet){

this.x=x
this.leaflet=leaflet
this.vx=(Math.random()-0.5)*0.2
this.phase=Math.random()*Math.PI

}

move(){

this.vx+=(Math.random()-0.5)*0.05

if(this.vx>0.4) this.vx=0.4
if(this.vx<-0.4) this.vx=-0.4

this.x+=this.vx

if(this.x<-40) this.x=canvas.width+40
if(this.x>canvas.width+40) this.x=-40

this.phase+=0.08

}

draw(){

let base=this.leaflet==="outer"?mid()-OFFSET:mid()+OFFSET
let y=base+membraneCurve(this.x)

const dir=this.leaflet==="outer"?1:-1

ctx.fillStyle="#4dabf7"

ctx.beginPath()
ctx.arc(this.x,y,HEAD,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="#ffd43b"
ctx.lineWidth=2

let bend=Math.sin(this.phase)*6

ctx.beginPath()

ctx.moveTo(this.x-4,y)
ctx.lineTo(this.x-4+bend,y+dir*TAIL)

ctx.moveTo(this.x+4,y)
ctx.lineTo(this.x+4-bend,y+dir*TAIL)

ctx.stroke()

}

}

/* ====================
CHOLESTEROL
==================== */

class Cholesterol{

constructor(x){
this.x=x
}

move(){
this.x+=(Math.random()-0.5)*0.15
}

draw(){

let y=mid()+membraneCurve(this.x)

ctx.fillStyle="#ffe066"

ctx.fillRect(this.x-4,y-35,8,70)

ctx.beginPath()
ctx.arc(this.x,y-40,3,0,Math.PI*2)
ctx.fill()

}

}

/* ====================
ION CHANNEL
==================== */

class Channel{

constructor(x){
this.x=x
this.ions=[]
}

move(){

if(Math.random()<0.03)
this.ions.push({y:mid()-120})

this.ions.forEach(i=>i.y+=2)

this.ions=this.ions.filter(i=>i.y<mid()+120)

}

draw(){

let y=mid()+membraneCurve(this.x)

ctx.fillStyle="#6c5ce7"

ctx.beginPath()
ctx.roundRect(this.x-16,y-110,32,220,12)
ctx.fill()

ctx.fillStyle="#00e5ff"

this.ions.forEach(i=>{
ctx.beginPath()
ctx.arc(this.x,i.y,4,0,Math.PI*2)
ctx.fill()
})

}

}

/* ====================
CARRIER PROTEIN
==================== */

class Carrier{

constructor(x){
this.x=x
this.phase=0
this.molecules=[]
}

move(){

this.phase+=0.05

if(Math.random()<0.03)
this.molecules.push({y:mid()-110})

this.molecules.forEach(m=>m.y+=2)

this.molecules=this.molecules.filter(m=>m.y<mid()+110)

}

draw(){

let y=mid()+membraneCurve(this.x)

ctx.fillStyle="#ffa94d"

const w=20+Math.sin(this.phase)*6

ctx.beginPath()
ctx.ellipse(this.x,y,w,100,0,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="#00ffcc"

this.molecules.forEach(m=>{
ctx.beginPath()
ctx.arc(this.x,m.y,4,0,Math.PI*2)
ctx.fill()
})

}

}

/* ====================
Na/K PUMP
==================== */

class Pump{

constructor(x){

this.x=x
this.state=0
this.timer=0
this.na=[]
this.k=[]

}

move(){

let center=mid()+membraneCurve(this.x)

this.timer++

if(this.state===0){

if(this.na.length<3){
this.na.push({y:center+90})
}

if(this.timer>40){
this.state=1
this.timer=0
}

}

else if(this.state===1){

this.na.forEach(i=>i.y-=2)

if(this.na.every(i=>i.y<center-110)){
this.na=[]
this.state=2
this.timer=0
}

}

else if(this.state===2){

if(this.k.length<2){
this.k.push({y:center-110})
}

if(this.timer>40){
this.state=3
this.timer=0
}

}

else if(this.state===3){

this.k.forEach(i=>i.y+=2)

if(this.k.every(i=>i.y>center+90)){
this.k=[]
this.state=0
this.timer=0
}

}

}

draw(){

let y=mid()+membraneCurve(this.x)

ctx.fillStyle="#ff6b6b"

ctx.beginPath()
ctx.roundRect(this.x-18,y-110,36,220,12)
ctx.fill()

ctx.fillStyle="#00d4ff"

this.na.forEach(i=>{
ctx.beginPath()
ctx.arc(this.x-8,i.y,4,0,Math.PI*2)
ctx.fill()
})

ctx.fillStyle="#aaff00"

this.k.forEach(i=>{
ctx.beginPath()
ctx.arc(this.x+8,i.y,4,0,Math.PI*2)
ctx.fill()
})

}

}

/* ====================
INTEGRAL PROTEIN
==================== */

class Integral{

constructor(x){
this.x=x
}

draw(){

let y=mid()+membraneCurve(this.x)

ctx.fillStyle="#845ef7"

ctx.beginPath()
ctx.roundRect(this.x-16,y-110,32,220,12)
ctx.fill()

}

}

/* arrays */

const lipids=[]
const cholesterol=[]

for(let x=0;x<canvas.width;x+=SPACING){

lipids.push(new Lipid(x,"outer"))
lipids.push(new Lipid(x,"inner"))

}

for(let x=40;x<canvas.width;x+=120)
cholesterol.push(new Cholesterol(x))

const channel=new Channel(canvas.width*0.2)
const carrier=new Carrier(canvas.width*0.45)
const pump=new Pump(canvas.width*0.6)
const integral=new Integral(canvas.width*0.8)

/* animation */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

time+=0.02

ctx.fillStyle="rgba(255,255,255,0.03)"
ctx.fillRect(0,mid()-95,canvas.width,190)

lipids.forEach(l=>{
l.move()
l.draw()
})

cholesterol.forEach(c=>{
c.move()
c.draw()
})

channel.move()
channel.draw()

carrier.move()
carrier.draw()

pump.move()
pump.draw()

integral.draw()

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
