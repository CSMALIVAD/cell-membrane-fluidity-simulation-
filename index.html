<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
}

canvas{
width:100vw;
height:100vh;
display:block;
}

.label{
position:absolute;
left:50%;
transform:translateX(-50%);
font-size:14px;
}

#extra{top:20px}
#outer{top:33vh}
#core{top:50vh}
#inner{top:67vh}
#cyto{bottom:120px}

.legend{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.65);
padding:14px 18px;
border-radius:10px;
display:grid;
grid-template-columns:1fr 1fr;
gap:6px 24px;
font-size:13px;
}

.sym{
display:inline-block;
width:14px;
height:14px;
margin-right:6px;
}

.head{background:#4dabf7}
.tail{background:#ffd43b}
.chol{background:#ffe066}
.protein{background:#845ef7}
.raft{background:#ffa94d}

</style>
</head>

<body>

<canvas id="membrane"></canvas>

<div id="extra" class="label">Extracellular space</div>
<div id="outer" class="label">Outer hydrophilic surface</div>
<div id="core" class="label">Hydrophobic lipid core</div>
<div id="inner" class="label">Inner hydrophilic surface</div>
<div id="cyto" class="label">Cytoplasm</div>

<div class="legend">
<div><span class="sym head"></span>Phospholipid head</div>
<div><span class="sym tail"></span>Fatty acid tails</div>
<div><span class="sym chol"></span>Cholesterol</div>
<div><span class="sym protein"></span>Membrane proteins</div>
<div><span class="sym raft"></span>Lipid raft domain</div>
</div>

<script>

const canvas=document.getElementById("membrane")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.addEventListener("resize",resize)

const mid=()=>canvas.height/2

/* membrane parameters */

const OFFSET=95
const TAIL=70
const HEAD=9
const SPACING=16

/* dynamic membrane curvature */

let time=0

function membraneCurve(x){

return Math.sin(x*0.006+time)*12

}

/* lipid raft domains */

const rafts=[
{center:300,width:200},
{center:900,width:220}
]

function raftFactor(x){

let factor=1

rafts.forEach(r=>{
if(Math.abs(x-r.center)<r.width/2){
factor=0.5
}
})

return factor
}

/* PHOSPHOLIPID */

class Lipid{

constructor(x,leaflet){

this.x=x
this.leaflet=leaflet
this.vx=(Math.random()-0.5)*0.2
this.phase=Math.random()*Math.PI

}

move(){

/* Brownian diffusion */

this.vx+=(Math.random()-0.5)*0.05

if(this.vx>0.4) this.vx=0.4
if(this.vx<-0.4) this.vx=-0.4

this.x+=this.vx*raftFactor(this.x)

if(this.x<-40) this.x=canvas.width+40
if(this.x>canvas.width+40) this.x=-40

this.phase+=0.08

}

draw(){

let base=this.leaflet==="outer"?mid()-OFFSET:mid()+OFFSET
let y=base+membraneCurve(this.x)

const dir=this.leaflet==="outer"?1:-1

ctx.fillStyle="#4dabf7"
ctx.beginPath()
ctx.arc(this.x,y,HEAD,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="#ffd43b"
ctx.lineWidth=2

let bend=Math.sin(this.phase)*6*raftFactor(this.x)

ctx.beginPath()

ctx.moveTo(this.x-4,y)
ctx.lineTo(this.x-4+bend,y+dir*TAIL)

ctx.moveTo(this.x+4,y)
ctx.lineTo(this.x+4-bend,y+dir*TAIL)

ctx.stroke()

}

}

/* CHOLESTEROL */

class Cholesterol{

constructor(x){
this.x=x
}

move(){
this.x+=(Math.random()-0.5)*0.15
}

draw(){

let y=mid()+membraneCurve(this.x)

ctx.fillStyle="#ffe066"

ctx.fillRect(this.x-4,y-35,8,70)

ctx.beginPath()
ctx.arc(this.x,y-40,3,0,Math.PI*2)
ctx.fill()

}

}

/* PROTEIN */

class Protein{

constructor(x){

this.x=x
this.size=30+Math.random()*10

}

move(){

this.x+=(Math.random()-0.5)*0.2

if(this.x<-40) this.x=canvas.width+40
if(this.x>canvas.width+40) this.x=-40

}

draw(){

let y=mid()+membraneCurve(this.x)

ctx.fillStyle="#845ef7"

ctx.beginPath()
ctx.roundRect(this.x-this.size/2,y-110,this.size,220,12)
ctx.fill()

/* membrane bending due to protein */

ctx.beginPath()
ctx.arc(this.x,y,40,0,Math.PI*2)
ctx.strokeStyle="rgba(255,255,255,0.05)"
ctx.stroke()

}

}

/* ARRAYS */

const lipids=[]
const cholesterol=[]
const proteins=[]

for(let x=0;x<canvas.width;x+=SPACING){

lipids.push(new Lipid(x,"outer"))
lipids.push(new Lipid(x,"inner"))

}

for(let x=40;x<canvas.width;x+=120)
cholesterol.push(new Cholesterol(x))

for(let i=0;i<6;i++)
proteins.push(new Protein(Math.random()*canvas.width))

/* ANIMATION */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

time+=0.02

/* hydrophobic region */

ctx.fillStyle="rgba(255,255,255,0.03)"
ctx.fillRect(0,mid()-95,canvas.width,190)

/* lipid rafts */

rafts.forEach(r=>{

ctx.fillStyle="rgba(255,169,77,0.08)"
ctx.fillRect(r.center-r.width/2,mid()-95,r.width,190)

})

lipids.forEach(l=>{
l.move()
l.draw()
})

cholesterol.forEach(c=>{
c.move()
c.draw()
})

proteins.forEach(p=>{
p.move()
p.draw()
})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
